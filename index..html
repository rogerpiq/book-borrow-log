<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Borrow Log – DCC Kampung Bakam</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;padding:1.5rem;color:#1a1a1a}
.wrap{max-width:580px;margin:0 auto}
h2{font-size:20px;font-weight:600;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.section-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.field{margin-bottom:1rem}
.field:last-child{margin-bottom:0}
label{display:block;font-size:13px;color:#555;margin-bottom:5px}
input{width:100%;height:38px;padding:0 10px;border-radius:8px;border:1px solid #ddd;background:#fafafa;color:#1a1a1a;font-size:14px;font-family:inherit}
input:focus{outline:none;border-color:#4285f4;box-shadow:0 0 0 3px rgba(66,133,244,.15)}
.toggle-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.toggle-btn{height:42px;border-radius:8px;border:1px solid #ddd;background:#fafafa;color:#555;font-size:14px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.toggle-btn.active.borrow{background:#e8f0fe;border-color:#4285f4;color:#1a73e8;font-weight:600}
.toggle-btn.active.return{background:#e6f4ea;border-color:#34a853;color:#188038;font-weight:600}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.week-btn{height:28px;border-radius:6px;border:1px solid #4285f4;background:#e8f0fe;color:#1a73e8;font-size:12px;font-family:inherit;cursor:pointer;padding:0 10px;font-weight:600}
.week-btn:hover{background:#d2e3fc}
.duration-box{background:#fafafa;border:1px solid #ddd;border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.duration-num{font-size:24px;font-weight:600;color:#1a1a1a}
.duration-label{font-size:13px;color:#666}
.fine-box{border-radius:8px;padding:12px 16px;margin-top:12px;display:none}
.fine-box.none{background:#e6f4ea;border:1px solid #a8d5b5}
.fine-box.overdue{background:#fce8e6;border:1px solid #f5c6c2}
.fine-title{font-size:13px;font-weight:600;margin-bottom:2px}
.fine-box.none .fine-title{color:#188038}
.fine-box.overdue .fine-title{color:#c5221f}
.fine-amount{font-size:24px;font-weight:600}
.fine-box.none .fine-amount{color:#188038}
.fine-box.overdue .fine-amount{color:#c5221f}
.fine-sub{font-size:12px;margin-top:2px}
.fine-box.none .fine-sub{color:#188038}
.fine-box.overdue .fine-sub{color:#c5221f}
.upload-zone{border:2px dashed #ddd;border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;position:relative;transition:border-color .15s;background:#fafafa}
.upload-zone:hover{border-color:#4285f4;background:#f0f6ff}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .icon{font-size:28px;margin-bottom:6px}
.upload-zone p{font-size:13px;color:#666}
.preview-img{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-top:10px;display:none}
.btn-submit{width:100%;height:46px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:.5rem}
.btn-submit:hover{background:#1557b0}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.toast{border-radius:8px;padding:12px 18px;font-size:14px;margin-top:1rem;display:none;text-align:center;border:1px solid}
.toast.success{border-color:#a8d5b5;color:#188038;background:#e6f4ea}
.toast.error{border-color:#f5c6c2;color:#c5221f;background:#fce8e6}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h2>📚 Book borrow log</h2>
  <p class="sub">DCC Kampung Bakam – Pustaka Miri</p>

  <div class="card">
    <div class="section-label">Transaction type</div>
    <div class="toggle-row">
      <button class="toggle-btn borrow active" id="btnBorrow" onclick="setType('borrow')">⬇️ Borrow</button>
      <button class="toggle-btn return" id="btnReturn" onclick="setType('return')">⬆️ Return</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Borrower details</div>
    <div class="field">
      <label>Full name</label>
      <input type="text" id="borrowerName" placeholder="e.g. Ahmad bin Salleh">
    </div>
    <div class="field">
      <label>Phone number</label>
      <input type="tel" id="phoneNumber" placeholder="e.g. 011-1234 5678">
    </div>
  </div>

  <div class="card">
    <div class="section-label">Book details</div>
    <div class="field">
      <label>Book title</label>
      <input type="text" id="bookTitle" placeholder="e.g. Maha Rani">
    </div>
    <div class="field">
      <label>Barcode number</label>
      <input type="text" id="bookCode" placeholder="e.g. 13003 0000185">
    </div>
  </div>

  <div class="card" id="borrowDatesCard">
    <div class="section-label">Dates</div>
    <div class="date-row">
      <div class="field" style="margin-bottom:0">
        <label>Date of borrow</label>
        <input type="date" id="borrowDate" oninput="onBorrowChange()">
      </div>
      <div class="field" style="margin-bottom:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
          <label style="margin-bottom:0">Due date</label>
          <button class="week-btn" onclick="setOneWeek()">+1 week</button>
        </div>
        <input type="date" id="dueDate" oninput="onDueDateChange()">
      </div>
    </div>
    <div class="field" style="margin-top:12px">
      <label>Borrow duration</label>
      <div class="duration-box">
        <span class="duration-num" id="durationNum">—</span>
        <span class="duration-label" id="durationText">days</span>
      </div>
    </div>
  </div>

  <div class="card hidden" id="returnDatesCard">
    <div class="section-label">Return details</div>
    <div class="date-row">
      <div class="field" style="margin-bottom:0">
        <label>Due date</label>
        <input type="date" id="dueDateReturn" oninput="calcFine()">
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Actual return date</label>
        <input type="date" id="actualReturnDate" oninput="calcFine()">
      </div>
    </div>
    <div id="fineBox" class="fine-box">
      <div class="fine-title" id="fineTitle"></div>
      <div class="fine-amount" id="fineAmount"></div>
      <div class="fine-sub" id="fineSub"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Book cover photo</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="coverPhoto" onchange="handleImage(this)">
      <div class="icon">📷</div>
      <p>Click to upload or take a photo of the book cover</p>
    </div>
    <img id="previewImg" class="preview-img" alt="Book cover preview">
  </div>

  <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">💾 Save to Google Sheets</button>
  <div class="toast" id="toast"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzF9wmsSJaa-evKdJt_7ZgWN6yYRKAcThmW2gN619s8oIjzGrDciRfDZQsxNdBWhsKE/exec';

let txType = 'borrow';
let imageBase64 = '';
const MAX_BORROW_DAYS = 10;

const SARAWAK_HOLIDAYS = new Set([
  '2025-01-01','2025-01-29','2025-01-30',
  '2025-03-31','2025-04-01','2025-04-18',
  '2025-05-01','2025-05-12',
  '2025-06-01','2025-06-02','2025-06-03',
  '2025-06-07','2025-06-09',
  '2025-07-22','2025-08-30','2025-08-31',
  '2025-09-13','2025-09-16',
  '2025-10-20','2025-11-09',
  '2025-12-11','2025-12-25',
  '2026-01-01',
  '2026-02-17','2026-02-18',
  '2026-03-20','2026-03-21',
  '2026-04-03',
  '2026-05-01','2026-05-31',
  '2026-06-01','2026-06-02','2026-06-03',
  '2026-06-05','2026-06-06',
  '2026-07-22','2026-08-31',
  '2026-09-12','2026-09-16',
  '2026-11-08','2026-12-25',
]);

function isBlocked(dateStr) {
  if (!dateStr) return false;
  const day = new Date(dateStr + 'T00:00:00').getDay();
  return day === 0 || day === 6 || SARAWAK_HOLIDAYS.has(dateStr);
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function nearestWorkingDay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  while (isBlocked(fmtDate(d))) d.setDate(d.getDate() + 1);
  return fmtDate(d);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return fmtDate(d);
}

function diffDays(a, b) {
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
}

function getMaxDueDate(borrowStr) {
  let candidate = addDays(borrowStr, MAX_BORROW_DAYS);
  while (isBlocked(candidate)) {
    const d = new Date(candidate + 'T00:00:00');
    d.setDate(d.getDate() - 1);
    candidate = fmtDate(d);
  }
  return candidate;
}

function updateDueDateConstraints() {
  const borrow = document.getElementById('borrowDate').value;
  const dueEl = document.getElementById('dueDate');
  if (!borrow) return;
  const minDue = nearestWorkingDay(addDays(borrow, 1));
  const maxDue = getMaxDueDate(borrow);
  dueEl.min = minDue;
  dueEl.max = maxDue;
  const current = dueEl.value;
  if (current) {
    if (current < minDue) dueEl.value = minDue;
    else if (current > maxDue) dueEl.value = maxDue;
    else if (isBlocked(current)) dueEl.value = nearestWorkingDay(current);
  }
}

function onBorrowChange() {
  const val = document.getElementById('borrowDate').value;
  if (val && isBlocked(val)) {
    document.getElementById('borrowDate').value = nearestWorkingDay(val);
    showToast('That date is unavailable — adjusted to next working day.', 'error');
  }
  document.getElementById('dueDate').value = '';
  updateDueDateConstraints();
  calcDuration();
}

function onDueDateChange() {
  const borrow = document.getElementById('borrowDate').value;
  const val = document.getElementById('dueDate').value;
  if (!val || !borrow) return;
  if (diffDays(borrow, val) > MAX_BORROW_DAYS) {
    document.getElementById('dueDate').value = getMaxDueDate(borrow);
    showToast('Maximum borrow period is 10 days.', 'error');
  } else if (isBlocked(val)) {
    document.getElementById('dueDate').value = nearestWorkingDay(val);
    showToast('That date is unavailable — adjusted to next working day.', 'error');
  }
  calcDuration();
}

function setType(type) {
  txType = type;
  document.getElementById('btnBorrow').className = 'toggle-btn borrow' + (type==='borrow'?' active':'');
  document.getElementById('btnReturn').className = 'toggle-btn return' + (type==='return'?' active':'');
  document.getElementById('borrowDatesCard').className = 'card' + (type==='borrow'?'':' hidden');
  document.getElementById('returnDatesCard').className = 'card' + (type==='return'?'':' hidden');
  document.getElementById('fineBox').style.display = 'none';
}

function setOneWeek() {
  const b = document.getElementById('borrowDate').value;
  if (!b) { showToast('Set the borrow date first.', 'error'); return; }
  let candidate = addDays(b, 7);
  while (isBlocked(candidate)) {
    const d = new Date(candidate + 'T00:00:00');
    d.setDate(d.getDate() - 1);
    candidate = fmtDate(d);
  }
  if (diffDays(b, candidate) > MAX_BORROW_DAYS) candidate = getMaxDueDate(b);
  if (diffDays(b, candidate) <= 0) candidate = nearestWorkingDay(addDays(b, 1));
  document.getElementById('dueDate').value = candidate;
  calcDuration();
}

function calcDuration() {
  const b = document.getElementById('borrowDate').value;
  const r = document.getElementById('dueDate').value;
  const numEl = document.getElementById('durationNum');
  const txtEl = document.getElementById('durationText');
  if (b && r) {
    const diff = diffDays(b, r);
    if (diff >= 0) { numEl.textContent = diff; txtEl.textContent = diff===1?'day':'days'; }
    else { numEl.textContent = '!'; txtEl.textContent = 'due before borrow'; }
  } else { numEl.textContent = '—'; txtEl.textContent = 'days'; }
}

function calcFine() {
  const due = document.getElementById('dueDateReturn').value;
  const actual = document.getElementById('actualReturnDate').value;
  const box = document.getElementById('fineBox');
  if (!due || !actual) { box.style.display = 'none'; return; }
  const daysLate = Math.round((new Date(actual+'T00:00:00') - new Date(due+'T00:00:00')) / 86400000);
  box.style.display = 'block';
  if (daysLate <= 0) {
    box.className = 'fine-box none';
    document.getElementById('fineTitle').textContent = 'No fine';
    document.getElementById('fineAmount').textContent = 'RM 0.00';
    document.getElementById('fineSub').textContent = daysLate === 0 ? 'Returned on time.' : `Returned ${Math.abs(daysLate)} day${Math.abs(daysLate)===1?'':'s'} early.`;
  } else {
    box.className = 'fine-box overdue';
    document.getElementById('fineTitle').textContent = 'Late return fine';
    document.getElementById('fineAmount').textContent = `RM ${daysLate}.00`;
    document.getElementById('fineSub').textContent = `${daysLate} day${daysLate===1?'':'s'} overdue × RM 1.00 per day`;
  }
}

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result;
    const img = document.getElementById('previewImg');
    img.src = imageBase64; img.style.display = 'block';
    document.querySelector('#uploadZone p').textContent = file.name;
  };
  reader.readAsDataURL(file);
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

async function handleSubmit() {
  const borrowerName = document.getElementById('borrowerName').value.trim();
  const phoneNumber = document.getElementById('phoneNumber').value.trim();
  const bookTitle = document.getElementById('bookTitle').value.trim();
  const bookCode = document.getElementById('bookCode').value.trim();

  if (!borrowerName) return showToast('Enter the borrower name.', 'error');
  if (!phoneNumber) return showToast('Enter the phone number.', 'error');
  if (!bookTitle) return showToast('Enter the book title.', 'error');
  if (!bookCode) return showToast('Enter the barcode number.', 'error');

  let payload = { type: txType, borrowerName, phoneNumber, bookTitle, bookCode, image: imageBase64, timestamp: new Date().toISOString() };

  if (txType === 'borrow') {
    const borrowDate = document.getElementById('borrowDate').value;
    const dueDate = document.getElementById('dueDate').value;
    if (!borrowDate) return showToast('Select the borrow date.', 'error');
    if (!dueDate) return showToast('Select the due date.', 'error');
    Object.assign(payload, { borrowDate, dueDate, duration: diffDays(borrowDate, dueDate), fine: 0 });
  } else {
    const dueDateReturn = document.getElementById('dueDateReturn').value;
    const actualReturnDate = document.getElementById('actualReturnDate').value;
    if (!dueDateReturn) return showToast('Enter the due date.', 'error');
    if (!actualReturnDate) return showToast('Enter the actual return date.', 'error');
    const daysLate = Math.round((new Date(actualReturnDate+'T00:00:00') - new Date(dueDateReturn+'T00:00:00')) / 86400000);
    Object.assign(payload, { dueDate: dueDateReturn, actualReturnDate, daysLate: Math.max(0, daysLate), fine: daysLate > 0 ? daysLate : 0 });
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Saving...';

  try {
    const formData = new FormData();
    formData.append('data', JSON.stringify(payload));
    await fetch(SCRIPT_URL, { method: 'POST', body: formData });
    showToast('✅ Saved! Entry logged to Google Sheets.', 'success');
    resetForm();
  } catch(e) {
    showToast('❌ Failed to save. Check your internet connection.', 'error');
  }

  btn.disabled = false;
  btn.textContent = '💾 Save to Google Sheets';
}

function resetForm() {
  ['borrowerName','phoneNumber','bookTitle','bookCode','dueDate','dueDateReturn','actualReturnDate'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('durationNum').textContent = '—';
  document.getElementById('durationText').textContent = 'days';
  document.getElementById('fineBox').style.display = 'none';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewImg').src = '';
  imageBase64 = '';
  document.querySelector('#uploadZone p').textContent = 'Click to upload or take a photo of the book cover';
  initBorrowDate();
}

function initBorrowDate() {
  const todayStr = fmtDate(new Date());
  const startStr = nearestWorkingDay(todayStr);
  const el = document.getElementById('borrowDate');
  el.min = startStr;
  el.value = startStr;
  updateDueDateConstraints();
  calcDuration();
}

initBorrowDate();
</script>
</body>
</html>
